<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Honores de Grado · Valeria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rojo: #E63946;
            --rojo-hover: #C1121F;
            --rojo-glow: rgba(230, 57, 70, 0.4);
            --negro: #0A0A0A;
            --blanco: #F5F5F5;
            --blanco-dim: rgba(245, 245, 245, 0.7);
            --gris: #888888;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --holi-c1: #FF6B6B;
            --holi-c2: #4ECDC4;
            --holi-c3: #FFE66D;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--negro);
            color: var(--blanco);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== PARTICLE CANVAS ========== */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #particles.visible {
            opacity: 1;
        }

        /* ========== HERO FIJO ========== */
        .hero {
            position: relative;
            width: 100%;
        }

        /* Imagen FIJA - se queda en su lugar mientras scrollea */
        .hero-image-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 60%;
            display: block;
            transform: scale(1.05);
            transition: transform 8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .hero-image.loaded {
            transform: scale(1);
        }

        /* Glow orbs */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            z-index: 2;
        }

        .glow-orb-1 {
            width: 300px;
            height: 300px;
            background: var(--holi-c1);
            top: 10%;
            left: -10%;
        }

        .glow-orb-2 {
            width: 250px;
            height: 250px;
            background: var(--holi-c2);
            top: 30%;
            right: -5%;
            animation-delay: -2s;
        }

        .glow-orb-3 {
            width: 200px;
            height: 200px;
            background: var(--holi-c3);
            top: 50%;
            left: 20%;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.05); }
            66% { transform: translate(-10px, 15px) scale(0.95); }
        }

        /* Gradient mask */
        .hero-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(
                to top,
                var(--negro) 0%,
                rgba(10, 10, 10, 0.98) 15%,
                rgba(10, 10, 10, 0.85) 30%,
                rgba(10, 10, 10, 0.5) 50%,
                transparent 75%
            );
            pointer-events: none;
            z-index: 3;
        }

        /* ========== CONTENT - SCROLLEA SOBRE LA IMAGEN ========== */
        .content {
            position: relative;
            z-index: 10;
            padding: 0 1.25rem 4rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 600px;
            margin: -35vh auto 0;
        }

        /* ========== BADGE ========== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-hover) 100%);
            color: white;
            padding: 0.55rem 1.1rem;
            border-radius: 2rem;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            box-shadow: 0 4px 20px var(--rojo-glow);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
            width: fit-content;
        }

        .badge svg {
            width: 11px;
            height: 11px;
            animation: sparkle 1.5s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
        }

        /* ========== HEADLINE ========== */
        .headline {
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.35s;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 15vw, 7rem);
            font-weight: 400;
            line-height: 0.88;
            letter-spacing: 0.02em;
            color: var(--blanco);
        }

        h1 span {
            background: linear-gradient(135deg, var(--rojo) 0%, #FF8A9B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(0.9rem, 2.5vw, 1.25rem);
            color: var(--blanco-dim);
            margin-top: 0.4rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== INFO CARD ========== */
        .info-card {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.5s;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            transition: background 0.3s ease;
        }

        .info-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .info-icon {
            width: 20px;
            height: 20px;
            color: var(--rojo);
            flex-shrink: 0;
            filter: drop-shadow(0 0 6px var(--rojo-glow));
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--gris);
            margin-bottom: 0.2rem;
            font-weight: 600;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        /* ========== BUTTONS ========== */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.65s;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            padding: 1rem 1.5rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: none;
            text-decoration: none;
            letter-spacing: -0.01em;
            min-height: 54px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.2) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                transparent 100%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.965) translateY(2px);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn:hover svg {
            transform: scale(1.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-hover) 100%);
            color: white;
            box-shadow: 
                0 4px 20px var(--rojo-glow),
                0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            box-shadow: 
                0 8px 30px var(--rojo-glow),
                0 4px 12px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: scale(0.965) translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-gate {
            background: rgba(230, 57, 70, 0.08);
            color: white;
            border: 1px solid rgba(230, 57, 70, 0.4);
        }

        .btn-gate:hover {
            background: rgba(230, 57, 70, 0.15);
            border-color: var(--rojo);
            transform: translateY(-2px);
        }

        .btn-gate.active {
            background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-hover) 100%);
            border-color: transparent;
        }

        /* ========== GATE REVEAL ========== */
        .gate-panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .gate-panel.active {
            max-height: 150px;
            opacity: 1;
        }

        .gate-content {
            background: linear-gradient(135deg, rgba(230, 57, 70, 0.15) 0%, rgba(230, 57, 70, 0.05) 100%);
            border: 1px solid rgba(230, 57, 70, 0.25);
            border-radius: 1.25rem;
            padding: 1.25rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .gate-content::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .gate-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--blanco-dim);
            margin-bottom: 0.4rem;
        }

        .gate-code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--rojo) 0%, #FF8A9B 50%, var(--rojo) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px var(--rojo-glow));
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            font-size: 0.6rem;
            color: var(--gris);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
            animation-delay: 0.8s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* ========== SCROLL INDICATOR ========== */
        .scroll-hint {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--gris);
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scroll-hint.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        .scroll-hint .mouse {
            width: 20px;
            height: 32px;
            border: 1.5px solid var(--gris);
            border-radius: 10px;
            position: relative;
            opacity: 0.6;
        }

        .scroll-hint .wheel {
            width: 3px;
            height: 6px;
            background: var(--gris);
            border-radius: 2px;
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            animation: scrollWheel 2s ease-in-out infinite;
        }

        @keyframes scrollWheel {
            0%, 100% { 
                transform: translateX(-50%) translateY(0); 
                opacity: 1;
            }
            50% { 
                transform: translateX(-50%) translateY(8px); 
                opacity: 0.3;
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (min-width: 768px) {
            .content {
                padding: 0 2.5rem 5rem;
                gap: 2rem;
            }

            .hero-image-wrapper {
                height: 100vh;
            }

            .buttons {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .buttons .btn {
                flex: 1;
                min-width: 180px;
            }

            .btn {
                min-height: 58px;
                font-size: 1rem;
            }

            .info-card {
                border-radius: 1.5rem;
            }

            .info-row {
                padding: 1.1rem 1.4rem;
                gap: 1.25rem;
            }

            .info-icon {
                width: 22px;
                height: 22px;
            }

            .info-value {
                font-size: 1rem;
            }

            h1 {
                font-size: clamp(4rem, 12vw, 7rem);
            }
        }

        @media (max-width: 480px) {
            .hero-image {
                object-position: center 55%;
            }

            .content {
                margin-top: -40vh;
            }
        }

        @media (max-width: 360px) {
            .content {
                padding: 0 1rem 3rem;
                gap: 1.25rem;
            }

            h1 {
                font-size: clamp(3rem, 14vw, 4rem);
            }

            .btn {
                padding: 0.9rem 1.25rem;
                min-height: 50px;
                font-size: 0.9rem;
            }
        }

        /* Safe area insets for notched devices */
        @supports (padding: env(safe-area-inset-top)) {
            .content {
                padding-left: calc(1.25rem + env(safe-area-inset-left));
                padding-right: calc(1.25rem + env(safe-area-inset-right));
                padding-bottom: calc(4rem + env(safe-area-inset-bottom));
            }

            .scroll-hint {
                bottom: calc(1.5rem + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

    <div class="scroll-hint" id="scrollHint">

    <script>
        // ========== HERO IMAGE LOAD ==========
        const heroImg = document.getElementById('heroImg');
        heroImg.addEventListener('load', () => {
            heroImg.classList.add('loaded');
        });

        // ========== PARTICLE SYSTEM ==========
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let particlesStarted = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const holiColors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#E63946', '#FF8A9B'];

        class Particle {
            constructor(x, y, burst = false) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 1;
                this.color = holiColors[Math.floor(Math.random() * holiColors.length)];
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.25 + 0.1;
                this.life = 1;
                this.decay = burst ? 0.012 : 0.001;
                this.isBurst = burst;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;

                if (this.isBurst) {
                    this.speedY += 0.05;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity * this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createAmbientParticles() {
            if (particlesStarted) return;
            particlesStarted = true;
            particles = [];
            for (let i = 0; i < 25; i++) {
                particles.push(new Particle());
            }
            animateParticles();
            canvas.classList.add('visible');
        }

        function burstParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, true));
            }
            if (!particlesStarted) {
                createAmbientParticles();
            }
        }

        function animateParticles() {
            if (particles.length === 0) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        // ========== GATE TOGGLE ==========
        let gateOpen = false;
        const btn = document.getElementById('gateBtn');
        const text = document.getElementById('gateText');
        const panel = document.getElementById('gatePanel');
        const hint = document.getElementById('scrollHint');
        const whatsappBtn = document.getElementById('whatsappBtn');

        function toggleGate() {
            gateOpen = !gateOpen;
            if (gateOpen) {
                panel.classList.add('active');
                btn.classList.add('active');
                text.textContent = 'Código Revelado';

                const rect = btn.getBoundingClientRect();
                burstParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
            } else {
                panel.classList.remove('active');
                btn.classList.remove('active');
                text.textContent = 'Gate Code';
            }
        }

        whatsappBtn.addEventListener('click', () => {
            const rect = whatsappBtn.getBoundingClientRect();
            burstParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
        });

        // Activar partículas al hacer scroll
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                hint.classList.add('hidden');
                createAmbientParticles();
            }
        });

        // Activar partículas en cualquier click inicial
        document.addEventListener('click', function initParticlesOnClick() {
            createAmbientParticles();
            document.removeEventListener('click', initParticlesOnClick);
        }, { once: true });

        // Timeout como backup
        setTimeout(() => {
            createAmbientParticles();
        }, 3000);
    </script>
</body>
</html>
